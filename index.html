<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,600;1,400&family=Tenor+Sans&family=Scheherazade+New:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#eee8e0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:2rem;
}
.card{
  background:#fdfaf6;
  max-width:460px;
  width:100%;
  position:relative;
  box-shadow:0 8px 48px rgba(120,80,40,0.13);
}
.border-frame{
  position:absolute;
  inset:10px;
  border:0.8px solid #c8a87a;
  pointer-events:none;
  z-index:3;
}
.border-frame-inner{
  position:absolute;
  inset:14px;
  border:0.3px solid #e0c89a;
  pointer-events:none;
  z-index:3;
}
.photo-wrap{
  width:100%;
  height:320px;
  overflow:hidden;
  position:relative;
}
.photo-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 15%;
  display:block;
  filter:sepia(12%) saturate(90%);
}
.photo-fade{
  position:absolute;
  bottom:0;left:0;right:0;
  height:160px;
  background:linear-gradient(to bottom, transparent 0%, #fdfaf6 100%);
}
.content{
  padding:0 2.8rem 2.6rem;
  text-align:center;
}
.bismi{
  font-family:'Scheherazade New', serif;
  font-size:22px;
  color:#8a5c38;
  direction:rtl;
  line-height:2;
  margin-bottom:0.1rem;
}
.occasion-ar{
  font-family:'Scheherazade New', serif;
  font-size:17px;
  color:#b08050;
  direction:rtl;
  line-height:1.9;
  margin-bottom:1rem;
}
.thin-rule{
  display:flex;
  align-items:center;
  gap:12px;
  margin:0.6rem 0 1.4rem;
}
.rule-line{height:0.5px;flex:1;background:#d4b080}
.rule-diamond{
  width:6px;height:6px;
  background:#c4905a;
  transform:rotate(45deg);
  flex-shrink:0;
}
.names-block{
  margin-bottom:0.2rem;
}
.name{
  font-family:'Bodoni Moda', serif;
  font-size:52px;
  font-weight:400;
  color:#3d2510;
  letter-spacing:0.04em;
  line-height:1.15;
  display:block;
}
.name-amp{
  font-family:'Bodoni Moda', serif;
  font-style:italic;
  font-size:22px;
  color:#c4905a;
  display:block;
  margin:0.3rem 0;
  letter-spacing:0.1em;
}
.details-wrap{
  margin:1.4rem 0 0;
  display:flex;
  flex-direction:column;
  gap:1rem;
}
.detail-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.dl{
  font-family:'Tenor Sans', sans-serif;
  font-size:9px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:#c4a070;
}
.dv{
  font-family:'Bodoni Moda', serif;
  font-size:20px;
  font-weight:400;
  color:#3d2510;
  letter-spacing:0.02em;
  line-height:1.4;
}
.dv-sub{
  font-family:'Tenor Sans', sans-serif;
  font-size:13px;
  color:#9a7050;
  margin-top:1px;
}
.map-link{
  font-family:'Tenor Sans', sans-serif;
  font-size:9px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:#c4905a;
  text-decoration:none;
  border-bottom:0.5px solid #e0c090;
  padding-bottom:1px;
  margin-top:4px;
  display:inline-block;
}
.ayah-wrap{
  border-top:0.5px solid #e0c8a0;
  border-bottom:0.5px solid #e0c8a0;
  padding:1rem 0.5rem;
  margin:1.4rem 0 1.2rem;
}
.ayah-ar{
  font-family:'Scheherazade New', serif;
  font-size:17px;
  color:#7a5030;
  direction:rtl;
  line-height:2.2;
  margin-bottom:0.3rem;
}
.ayah-en{
  font-family:'Bodoni Moda', serif;
  font-style:italic;
  font-size:12px;
  color:#a08050;
  line-height:1.8;
}
.rsvp-wrap{text-align:center}
.rsvp-wrap .dl{margin-bottom:3px}
.rsvp-wrap .dv{font-size:17px}
</style>
</head>
<body>
<div class="card">
  <div class="border-frame"></div>
  <div class="border-frame-inner"></div>

  <div class="photo-wrap">
    <img src="kids-photo.jpg" alt="Kids Photo">
    <div class="photo-fade"></div>
  </div>

  <div class="content">

    <p class="bismi">بسم الله الرحمن الرحيم</p>
    <p class="occasion-ar">قراءة الفاتحة</p>

    <div class="thin-rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line"></div>
    </div>

    <div class="names-block">
      <span class="name">Mohamed</span>
      <span class="name-amp">& </span>
      <span class="name">Mariam</span>
    </div>

    <div class="thin-rule" style="margin-top:1.2rem">
      <div class="rule-line"></div>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <ellipse cx="9" cy="9" rx="2.5" ry="6.5" fill="#e8b888" opacity="0.9"/>
        <ellipse cx="9" cy="9" rx="6.5" ry="2.5" fill="#e8b888" opacity="0.9"/>
        <circle cx="9" cy="9" r="2.2" fill="#c4905a"/>
      </svg>
      <div class="rule-line"></div>
    </div>

    <div class="details-wrap">
      <div class="detail-item">
        <span class="dl">Date</span>
        <span class="dv">Friday, May 1st</span>
        <span class="dv-sub">2026</span>
      </div>
      <div class="detail-item">
        <span class="dl">Time</span>
        <span class="dv">6:00 in the evening</span>
      </div>
      <div class="detail-item">
        <span class="dl">Venue</span>
        <span class="dv">6th of October</span>
        <a class="map-link" href="https://maps.app.goo.gl/3d5RAM5sKk5qpqvw8" target="_blank">View on Map</a>
      </div>
    </div>

    <div class="ayah-wrap">
      <p class="ayah-ar">﴿ وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا ﴾</p>
      <span style="font-size:11px;color:#c4a070">— Surah Ar-Rum, 21</span></p>
    </div>

    <div class="rsvp-wrap">
      <p class="dl">Kindly confirm attendance by</p>
      <p class="dv">April 25th, 2026</p>
    </div>

  </div>
</div>
</body>
</html>
